<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotlite - Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="search">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <a class="brand" href="index.html" aria-label="Spotlite home">
        <span class="brand-mark">S</span>
        <span>Spotlite</span>
      </a>

      <nav class="nav-links">
        <a class="nav-link" href="index.html" data-page-link="home">
          <span class="icon">H</span>
          <span>Home</span>
        </a>
        <a class="nav-link" href="search.html" data-page-link="search">
          <span class="icon">S</span>
          <span>Search</span>
        </a>
        <a class="nav-link" href="library.html" data-page-link="library">
          <span class="icon">L</span>
          <span>Library</span>
        </a>
      </nav>

      <div class="playlist-stack">
        <button class="ghost-button">+ Create playlist</button>
        <button class="ghost-button">Liked songs</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="history-buttons" aria-label="History controls">
          <button aria-label="Go back">&lt;</button>
          <button aria-label="Go forward">&gt;</button>
        </div>
        <div class="top-actions">
          <button class="pill secondary">Upgrade</button>
          <button class="profile-button" aria-label="Profile">AG</button>
        </div>
      </header>

      <section class="page" aria-labelledby="search-title">
        <div class="search-header">
          <h1 id="search-title">Search</h1>
          <label class="search-box">
            <span>S</span>
            <input type="search" placeholder="What do you want to listen to?">
          </label>
        </div>

        <h2>Browse all</h2>
        <div class="category-grid">
          <article class="category-card pop">Pop</article>
          <article class="category-card hiphop">Hip-Hop</article>
          <article class="category-card mood">Mood</article>
          <article class="category-card rock">Rock</article>
          <article class="category-card dance">Dance</article>
          <article class="category-card latin">Latin</article>
          <article class="category-card podcast">Podcasts</article>
          <article class="category-card jazz">Jazz</article>
        </div>
      </section>
    </main>

    <footer class="player" aria-label="Now playing">
      <div class="track-info">
        <span class="mini-cover"></span>
        <div>
          <strong>Golden Hour</strong>
          <span>Nova Lane</span>
        </div>
      </div>
      <div class="player-controls">
        <div class="control-row">
          <button aria-label="Shuffle">Sh</button>
          <button aria-label="Previous">Prev</button>
          <button class="main-control" aria-label="Play">Play</button>
          <button aria-label="Next">Next</button>
          <button aria-label="Repeat">Rp</button>
        </div>
        <div class="progress-row">
          <span>1:12</span>
          <div class="progress"><span></span></div>
          <span>3:48</span>
        </div>
      </div>
      <div class="volume-row">
        <span>Vol</span>
        <div class="volume"><span></span></div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
